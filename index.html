<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f6f5b" />
    <title>Black-76 期权权利金计算器</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand">
          <img class="brand-icon" src="icons/icon.svg" alt="" aria-hidden="true" />
          <div>
            <h1>Black-76 期权权利金计算器</h1>
            <p>期货期权多期限报价</p>
          </div>
        </div>
        <div class="header-actions">
          <span id="online-status" class="status-pill">在线</span>
          <button id="install-button" class="ghost-button" type="button" hidden>安装</button>
        </div>
      </header>

      <section class="workspace" aria-label="计算器">
        <form id="calculator-form" class="input-panel">
          <div class="panel-title">输入</div>

          <label class="field">
            <span>期货价格</span>
            <input id="future-price" name="future-price" inputmode="decimal" autocomplete="off" value="1025" />
          </label>

          <div class="contract-select-grid" aria-label="合约选择">
            <label class="field">
              <span>合约 1</span>
              <select id="contract-1" name="contract-1"></select>
            </label>
            <label class="field">
              <span>合约 2</span>
              <select id="contract-2" name="contract-2"></select>
            </label>
            <label class="field">
              <span>合约 3</span>
              <select id="contract-3" name="contract-3"></select>
            </label>
          </div>
          <div id="today-label" class="field-note">今天:</div>

          <details class="contract-manager" open>
            <summary>合约预设</summary>
            <div id="contract-list" class="contract-list"></div>
            <div class="contract-actions">
              <button id="add-contract-button" class="secondary-button" type="button">新增合约</button>
              <button id="reset-contracts-button" class="secondary-button" type="button">恢复默认合约</button>
            </div>
            <div class="field-note">到期日格式为 8 位数字，例如 20261124。过期合约不会出现在上方选择框里。</div>
          </details>

          <fieldset class="option-field">
            <legend>期权类型</legend>
            <div class="segmented-control">
              <label>
                <input id="option-call" type="radio" name="option-type" value="call" checked />
                <span>看涨</span>
              </label>
              <label>
                <input id="option-put" type="radio" name="option-type" value="put" />
                <span>看跌</span>
              </label>
              <label>
                <input id="option-both" type="radio" name="option-type" value="both" />
                <span>同时</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>隐含波动率</span>
            <input id="volatility" name="volatility" inputmode="decimal" autocomplete="off" value="40%" />
          </label>

          <label class="field">
            <span>无风险利率</span>
            <input id="risk-free-rate" name="risk-free-rate" inputmode="decimal" autocomplete="off" value="0%" />
          </label>

          <div class="days-grid" aria-label="行权价区间">
            <label class="field">
              <span>行权价最大值</span>
              <input id="strike-max" name="strike-max" inputmode="decimal" autocomplete="off" value="1288" />
            </label>
            <label class="field">
              <span>行权价最小值</span>
              <input id="strike-min" name="strike-min" inputmode="decimal" autocomplete="off" value="1160" />
            </label>
            <label class="field">
              <span>步长</span>
              <input id="strike-step" name="strike-step" inputmode="decimal" autocomplete="off" value="8" />
            </label>
          </div>

          <div class="field-note">按最大值到最小值生成行权价，步长必须大于 0。</div>

          <div class="button-row">
            <button class="primary-button" type="submit">计算</button>
            <button id="reset-button" class="secondary-button" type="button">重置</button>
          </div>
          <button id="copy-button" class="secondary-button full-width" type="button">复制结果</button>

          <output id="status-message" class="message" role="status">输入参数后点击计算。</output>
        </form>

        <section class="result-panel" aria-label="结果">
          <div class="panel-title">结果</div>
          <div class="table-frame">
            <table>
              <thead id="result-head"></thead>
              <tbody id="result-body"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
